apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: mrudul08cloud/3tier-frontend:11
        ports:
        - containerPort: 80
