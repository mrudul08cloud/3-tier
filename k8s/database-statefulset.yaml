apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres
  namespace: todo-app

spec:
  serviceName: postgres
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: "todo_db"

        - name: POSTGRES_USER
          value: "postgres"

        - name: POSTGRES_PASSWORD
          value: "postgres"

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage
        emptyDir: {}
