apiVersion: apps/v1
kind: Deployment
metadata:
name: backend
namespace: todo-app
spec:
replicas: 2
selector:
matchLabels:
app: backend
template:
metadata:
labels:
app: backend
spec:
containers:
- name: backend
image: YOUR_ECR_REPO/todo-backend:latest

```
    ports:
    - containerPort: 5000

    env:
    - name: FLASK_ENV
      value: "development"

    - name: DATABASE_URL
      value: "postgresql://postgres:postgres@postgres:5432/todo_db"

    - name: SECRET_KEY
      value: "super-secret-todo-key-change-in-production"
```
